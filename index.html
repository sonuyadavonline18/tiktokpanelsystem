<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="TikTok LIVE Rewards - Send gifts and rewards to your favorite creators">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TikTok LIVE Rewards</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Splash Screen -->
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <div class="splash-logo">
                <svg width="60" height="60" viewBox="0 0 48 48" fill="none">
                    <path
                        d="M34.1451 10.3815C32.4627 8.41364 31.5049 5.88176 31.5049 3.24902H26.0332L26.0249 32.5757C25.9543 34.9596 23.9727 36.8713 21.5638 36.8713C20.7779 36.8713 20.0339 36.6738 19.3774 36.3258C17.7568 35.4682 16.6594 33.7554 16.6594 31.7924C16.6594 29.0721 18.8441 26.8879 21.5638 26.8879C22.0752 26.8879 22.5672 26.9668 23.0343 27.1035V21.5381C22.5506 21.4716 22.0586 21.4303 21.5638 21.4303C15.834 21.4303 11.2012 26.0631 11.2012 31.7924C11.2012 35.3849 13.0548 38.555 15.8547 40.4363C17.5371 41.5846 19.5683 42.2535 21.5638 42.2535C27.2936 42.2535 31.9264 37.6207 31.9264 31.8914V17.1797C34.0863 18.7841 36.7396 19.7131 39.6 19.7131V14.2414C37.5234 14.2414 35.6242 13.5189 34.1451 10.3815Z"
                        fill="#fe2c55" />
                    <path
                        d="M34.1451 10.3815C32.4627 8.41364 31.5049 5.88176 31.5049 3.24902H26.0332L26.0249 32.5757C25.9543 34.9596 23.9727 36.8713 21.5638 36.8713C20.7779 36.8713 20.0339 36.6738 19.3774 36.3258C17.7568 35.4682 16.6594 33.7554 16.6594 31.7924C16.6594 29.0721 18.8441 26.8879 21.5638 26.8879C22.0752 26.8879 22.5672 26.9668 23.0343 27.1035V21.5381C22.5506 21.4716 22.0586 21.4303 21.5638 21.4303C15.834 21.4303 11.2012 26.0631 11.2012 31.7924C11.2012 35.3849 13.0548 38.555 15.8547 40.4363C17.5371 41.5846 19.5683 42.2535 21.5638 42.2535C27.2936 42.2535 31.9264 37.6207 31.9264 31.8914V17.1797C34.0863 18.7841 36.7396 19.7131 39.6 19.7131V14.2414C37.5234 14.2414 35.6242 13.5189 34.1451 10.3815Z"
                        fill="#00f2ea" style="transform: translate(-3px, -3px);" opacity="0.7" />
                </svg>
                <h1 class="splash-title">LIVE Rewards</h1>
            </div>
            <div class="splash-spinner"></div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="app" class="app hidden">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status-time" id="statusTime">09:34</span>
            <div class="status-icons">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                    <path
                        d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z" />
                </svg>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                    <path d="M2 22h20V2z M17 7L2 22h15z" opacity="0.3" />
                    <path d="M17 7v15H2z" />
                </svg>
                <span class="battery-text">47%</span>
            </div>
        </div>

        <!-- Top Navigation -->
        <div class="top-nav">
            <div class="nav-left">
                <div class="live-badge">
                    <span class="live-dot"></span>
                    LIVE
                </div>
                <span class="viewer-count" id="viewerCount">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                    </svg>
                    <span id="liveViewers">15,247</span>
                </span>
            </div>
            <div class="nav-right">
                <button class="nav-btn" id="searchToggle" aria-label="Search users">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                </button>
                <button class="nav-btn" aria-label="Notifications">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
                        <path d="M13.73 21a2 2 0 0 1-3.46 0" />
                    </svg>
                    <span class="notification-dot"></span>
                </button>
            </div>
        </div>

        <!-- Search Panel (Hidden by default) -->
        <div id="searchPanel" class="search-panel">
            <div class="search-header">
                <button class="back-btn" id="searchClose" aria-label="Close search">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                </button>
                <div class="search-input-wrap">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)"
                        stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <input type="text" id="searchInput" class="search-input"
                        placeholder="Search $cashtag or username..." autocomplete="off">
                    <button class="search-clear hidden" id="searchClear" aria-label="Clear search">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="rgba(255,255,255,0.5)">
                            <path
                                d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z" />
                        </svg>
                    </button>
                </div>
            </div>
            <div class="search-results" id="searchResults">
                <div class="search-hint">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.15)"
                        stroke-width="1.5">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <p>Search for TikTok users to send rewards</p>
                </div>
            </div>
        </div>

        <!-- Main Content Area -->
        <div class="main-content" id="mainContent">
            <!-- Balance Card -->
            <div class="balance-card">
                <div class="balance-card-bg"></div>
                <div class="balance-label">Available Balance</div>
                <div class="balance-amount" id="balanceAmount">$20,000,000</div>
                <div class="balance-sub">
                    <span class="verified-badge">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="#00f2ea">
                            <path
                                d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z" />
                        </svg>
                        Verified Account
                    </span>
                    <span class="daily-limit">Daily Limit: $500,000</span>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="action-btn primary" id="sendMoneyBtn">
                    <div class="action-icon send">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                        </svg>
                    </div>
                    <span>Send</span>
                </button>
                <button class="action-btn" id="requestBtn">
                    <div class="action-icon request">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 5v14M5 12h14" />
                        </svg>
                    </div>
                    <span>Request</span>
                </button>
                <button class="action-btn" id="giftBtn">
                    <div class="action-icon gift">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" />
                        </svg>
                    </div>
                    <span>Gift</span>
                </button>
                <button class="action-btn" id="historyBtn">
                    <div class="action-icon history">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10" />
                            <polyline points="12 6 12 12 16 14" />
                        </svg>
                    </div>
                    <span>History</span>
                </button>
            </div>

            <!-- Recent Transactions -->
            <div class="section-header">
                <h2>Recent Activity</h2>
                <button class="see-all-btn">See All</button>
            </div>
            <div class="transactions-list" id="transactionsList">
                <!-- Populated by JS -->
            </div>

            <!-- Live Chat Feed -->
            <div class="section-header">
                <h2>
                    <span class="live-dot small"></span>
                    Live Feed
                </h2>
            </div>
            <div class="live-feed" id="liveFeed">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- Send Money Modal -->
        <div id="sendModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <button class="back-btn" id="sendModalClose" aria-label="Close">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M18 6 6 18M6 6l12 12" />
                        </svg>
                    </button>
                    <h2 class="modal-title">Pay</h2>
                    <div style="width:40px"></div>
                </div>

                <!-- Step 1: Select User -->
                <div id="sendStep1" class="send-step active">
                    <div class="send-search-wrap">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)"
                            stroke-width="2">
                            <circle cx="11" cy="11" r="8" />
                            <path d="m21 21-4.3-4.3" />
                        </svg>
                        <input type="text" id="sendSearchInput" class="send-search-input"
                            placeholder="Search $cashtag or name..." autocomplete="off">
                    </div>
                    <div class="send-user-results" id="sendUserResults">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Step 2: Enter Amount -->
                <div id="sendStep2" class="send-step">
                    <div class="selected-user-info" id="selectedUserInfo">
                        <!-- Populated when user selected -->
                    </div>
                    <div class="amount-display">
                        <span class="currency-sign">$</span>
                        <span class="amount-value" id="amountValue">0</span>
                    </div>
                    <div class="numpad">
                        <button class="numpad-btn" data-num="1">1</button>
                        <button class="numpad-btn" data-num="2">2</button>
                        <button class="numpad-btn" data-num="3">3</button>
                        <button class="numpad-btn" data-num="4">4</button>
                        <button class="numpad-btn" data-num="5">5</button>
                        <button class="numpad-btn" data-num="6">6</button>
                        <button class="numpad-btn" data-num="7">7</button>
                        <button class="numpad-btn" data-num="8">8</button>
                        <button class="numpad-btn" data-num="9">9</button>
                        <button class="numpad-btn" data-num=".">.</button>
                        <button class="numpad-btn" data-num="0">0</button>
                        <button class="numpad-btn backspace" data-num="back">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2">
                                <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z" />
                                <line x1="18" y1="9" x2="12" y2="15" />
                                <line x1="12" y1="9" x2="18" y2="15" />
                            </svg>
                        </button>
                    </div>
                    <button class="pay-btn" id="payBtn" disabled>
                        <span>Continue</span>
                    </button>
                </div>

                <!-- Step 3: Confirm -->
                <div id="sendStep3" class="send-step">
                    <div class="confirm-card">
                        <div class="confirm-icon">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#00d632"
                                stroke-width="2">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" />
                            </svg>
                        </div>
                        <div class="confirm-amount" id="confirmAmount">$5,000</div>
                        <div class="confirm-to">to</div>
                        <div class="confirm-user" id="confirmUser">
                            <!-- Populated -->
                        </div>
                        <div class="confirm-note-wrap">
                            <input type="text" id="confirmNote" class="confirm-note-input" placeholder="Add a note...">
                        </div>
                        <button class="confirm-pay-btn" id="confirmPayBtn">
                            <span>Pay</span>
                        </button>
                    </div>
                </div>

                <!-- Step 4: Success -->
                <div id="sendStep4" class="send-step">
                    <div class="success-screen">
                        <div class="success-checkmark">
                            <svg class="checkmark-svg" width="80" height="80" viewBox="0 0 52 52">
                                <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none" />
                                <path class="checkmark-check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" />
                            </svg>
                        </div>
                        <div class="success-amount" id="successAmount">$5,000</div>
                        <div class="success-text">sent to</div>
                        <div class="success-user" id="successUser">valeriamartinez</div>
                        <div class="success-time" id="successTime">Just now</div>
                        <button class="done-btn" id="doneBtn">Done</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <button class="bottom-nav-btn active" data-tab="home">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <span>Home</span>
            </button>
            <button class="bottom-nav-btn" data-tab="activity">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
                </svg>
                <span>Activity</span>
            </button>
            <button class="bottom-nav-btn send-fab" id="fabSend">
                <div class="fab-icon">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                </div>
            </button>
            <button class="bottom-nav-btn" data-tab="rewards">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M20 12v10H4V12M2 7h20v5H2zM12 22V7M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7zM12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z" />
                </svg>
                <span>Rewards</span>
            </button>
            <button class="bottom-nav-btn" data-tab="profile">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <span>Profile</span>
            </button>
        </div>
    </div>

    <script src="users.js"></script>
    <script src="app.js"></script>
</body>

</html>
